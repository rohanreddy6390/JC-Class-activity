<!DOCTYPE html>
<html lang="en">

<body>
    <h2>JavaScript Class Inheritance</h2>
    <p id="details"></p>

    <script>
        class Car {
            constructor(brand) {
                this.carname = brand; // Removed stray semicolon/paren
            } // Added missing closing brace for constructor

            present() {
                return 'I have a ' + this.carname;
            }
        } // Added missing closing brace for class Car

        class Model extends Car {
            constructor(brand, mod) {
                super(brand);
                this.model = mod;
            }

            show() {
                return this.present() + ', it is a ' + this.model;
            }
        } // Added missing closing brace for class Model

        let myCar = new Model("Ford", "Mustang");
        document.getElementById("details").innerHTML = myCar.show();
    </script>
</body>

</html>
